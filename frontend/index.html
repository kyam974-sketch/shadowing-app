<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shadow Lab</title>
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="ShadowLab">
<meta name="theme-color" content="#1a56b0">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Source+Code+Pro:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #1a56b0;
    --surface: #1e65cc;
    --surface2: #2272e0;
    --border: #4a8fe8;
    --accent: #B22234;
    --accent2: #47ffe8;
    --accent3: #ff6b47;
    --text: #f0f0f5;
    --text-dim: #7a7a8a;
    --highlight-bg: rgba(178,34,52,0.15);
    --highlight-border: #B22234;
    --radius: 12px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { overflow-x: hidden; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── Grid noise background ── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.08) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.08) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .app { position: relative; z-index: 1; max-width: 1100px; margin: 0 auto; padding: 24px 20px 60px; }

  /* ── Header ── */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 32px;
    padding-bottom: 20px;
    border-bottom: 1px solid var(--border);
  }
  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .logo-icon {
    width: 36px; height: 36px;
    background: var(--accent);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
  }
  .logo h1 { font-size: 1.4rem; font-weight: 700; letter-spacing: -0.01em; }
  .logo span { color: var(--accent); }

  .student-selector {
    display: flex; align-items: center; gap: 10px;
  }
  .student-selector label { font-size: 0.8rem; color: var(--text-dim); }
  select, input[type=text] {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 8px 12px;
    border-radius: 8px;
    font-family: 'Inter', sans-serif;
    font-size: 0.85rem;
    outline: none;
    transition: border-color 0.2s;
  }
  select:focus, input[type=text]:focus { border-color: var(--accent); }
  select option { background: var(--surface2); }

  /* ── URL bar ── */
  .url-bar {
    display: flex;
    gap: 10px;
    margin-bottom: 24px;
  }
  .url-bar input {
    flex: 1;
    padding: 12px 16px;
    font-size: 0.95rem;
  }

  button {
    background: var(--accent);
    color: #ffffff;
    border: none;
    padding: 10px 20px;
    border-radius: 8px;
    font-family: 'Inter', sans-serif;
    font-weight: 700;
    font-size: 0.85rem;
    cursor: pointer;
    transition: transform 0.1s, opacity 0.2s;
    white-space: nowrap;
  }
  button:hover { opacity: 0.9; }
  button:active { transform: scale(0.97); }
  button:disabled { opacity: 0.4; cursor: not-allowed; }
  button.secondary {
    background: var(--surface2);
    color: var(--text);
    border: 1px solid var(--border);
  }
  button.secondary:hover { border-color: var(--accent); color: var(--accent); }
  button.danger { background: var(--accent3); }

  /* ── Status ── */
  .status {
    display: none;
    align-items: center;
    gap: 8px;
    margin-bottom: 16px;
    padding: 10px 14px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    font-size: 0.85rem;
    color: var(--text-dim);
  }
  .status.show { display: flex; }
  .status.error { border-color: var(--accent3); color: var(--accent3); }
  .spinner {
    width: 16px; height: 16px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    flex-shrink: 0;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Main layout ── */
  .main-grid {
    display: grid;
    grid-template-columns: 1fr 360px;
    gap: 20px;
    max-width: 100%;
  }
  @media (max-width: 800px) {
    .main-grid { grid-template-columns: 1fr; }
  }
  .exercises-row {
    margin-top: 0;
    width: 100%;
  }

  /* ── Video panel ── */
  .video-panel { display: flex; flex-direction: column; gap: 16px; }

  .video-wrapper {
    position: relative;
    padding-top: 56.25%;
    background: var(--surface);
    border-radius: var(--radius);
    overflow: hidden;
    border: 1px solid var(--border);
  }
  .video-wrapper iframe {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    border: none;
  }
  .video-placeholder {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 12px;
    color: var(--text-dim);
  }
  .video-placeholder .ph-icon { font-size: 3rem; opacity: 0.3; }
  .video-placeholder p { font-size: 0.85rem; }

  /* ── Controls ── */
  .controls {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
    padding: 12px 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
  }
  .speed-group {
    display: flex; align-items: center; gap: 6px;
    margin-left: auto;
  }
  .speed-group label { font-size: 0.78rem; color: var(--text-dim); }
  .speed-btn {
    background: var(--surface2);
    color: var(--text);
    border: 1px solid var(--border);
    padding: 5px 10px;
    border-radius: 6px;
    font-size: 0.78rem;
    font-weight: 600;
  }
  .speed-btn.active {
    background: var(--accent);
    color: #ffffff;
    border-color: var(--accent);
  }

  /* ── Transcript panel ── */
  .transcript-panel {
    display: flex;
    flex-direction: column;
    gap: 16px;
    min-width: 0;
    overflow: hidden;
  }

  .panel-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }
  .panel-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
  }
  .panel-title {
    font-size: 0.78rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-dim);
  }
  .source-badge {
    font-size: 0.7rem;
    padding: 2px 8px;
    border-radius: 20px;
    font-family: 'Source Code Pro', monospace;
  }
  .source-badge.youtube { background: rgba(255,0,0,0.15); color: #ff6b6b; }
  .source-badge.gemini  { background: rgba(71,255,232,0.15); color: var(--accent2); }

  /* ── Transcript lines ── */
  .transcript-list {
    max-height: 360px;
    overflow-y: auto;
    overflow-x: hidden;
    padding: 8px;
    display: flex;
    flex-direction: column;
    gap: 2px;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }
  .transcript-line {
    display: flex;
    gap: 10px;
    padding: 6px 10px;
    border-radius: 6px;
    cursor: pointer;
    transition: background 0.15s;
    align-items: flex-start;
  }
  .transcript-line:hover { background: var(--surface2); }
  .transcript-line.active {
    background: var(--highlight-bg);
    border-left: 2px solid var(--highlight-border);
  }
  .line-time {
    font-family: 'Source Code Pro', monospace;
    font-size: 0.7rem;
    color: var(--text-dim);
    min-width: 38px;
    padding-top: 2px;
    flex-shrink: 0;
  }
  .transcript-line.active .line-time { color: #e05568; }
  .line-text {
    font-size: 0.88rem;
    line-height: 1.5;
  }
  .line-text .word { display: inline; }
  .line-text .word.lit { color: var(--accent); }

  /* ── Loop controls ── */
  .loop-bar {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 14px;
    border-top: 1px solid var(--border);
    flex-wrap: wrap;
  }
  .loop-info {
    font-size: 0.78rem;
    color: var(--text-dim);
    font-family: 'Source Code Pro', monospace;
    flex: 1;
  }
  .loop-count {
    font-size: 0.75rem;
    color: var(--text-dim);
    display: flex; align-items: center; gap: 4px;
  }
  .loop-count select { padding: 4px 8px; font-size: 0.75rem; }

  /* ── Exercises ── */
  .exercises-panel { display: none; flex-direction: column; gap: 0; }
  .exercises-panel.show { display: flex; }

  .ex-tabs {
    display: flex;
    gap: 6px;
    padding: 10px 12px;
    border-bottom: 1px solid var(--border);
    overflow-x: auto;
    scrollbar-width: none;
    flex-wrap: nowrap;
    -webkit-overflow-scrolling: touch;
  }
  .ex-tabs::-webkit-scrollbar { display: none; }
  .ex-tab {
    background: transparent;
    color: var(--text-dim);
    border: 1px solid var(--border);
    padding: 5px 12px;
    font-size: 0.75rem;
  }
  .ex-tab.active {
    background: var(--accent);
    color: #ffffff;
    border-color: var(--accent);
  }

  .ex-content {
    padding: 14px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 12px;
    max-height: 400px;
    overflow-y: auto;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }

  .ex-item {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px;
    font-size: 0.85rem;
    line-height: 1.6;
  }
  .ex-item .ex-sentence { margin-bottom: 6px; }
  .ex-item .ex-answer {
    display: none;
    color: var(--accent);
    font-family: 'Source Code Pro', monospace;
    font-size: 0.8rem;
    margin-top: 4px;
  }
  /* ex-answer revealed on tap */
  .ex-item .ex-meta {
    font-size: 0.72rem;
    color: var(--text-dim);
    margin-top: 4px;
  }
  .stress-words { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 6px; }
  .stress-tag {
    background: rgba(207,16,32,0.2);
    color: var(--accent);
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 0.72rem;
    font-family: 'Source Code Pro', monospace;
  }

  /* ── Sessions ── */
  .sessions-list {
    display: flex;
    flex-direction: column;
    gap: 0;
    max-height: 260px;
    overflow-y: auto;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }
  .session-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 14px;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    transition: background 0.15s;
  }
  .session-item:hover { background: var(--surface2); }
  .session-item:last-child { border-bottom: none; }
  .session-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--accent2);
    flex-shrink: 0;
  }
  .session-info { flex: 1; min-width: 0; }
  .session-title {
    font-size: 0.82rem;
    font-weight: 600;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .session-meta {
    font-size: 0.72rem;
    color: var(--text-dim);
    font-family: 'Source Code Pro', monospace;
  }

  .empty-state {
    padding: 24px;
    text-align: center;
    color: var(--text-dim);
    font-size: 0.82rem;
  }

  /* ── Save bar ── */
  .save-bar {
    display: none;
    padding: 12px 14px;
    border-top: 1px solid var(--border);
    gap: 8px;
    flex-direction: column;
  }
  .save-bar.show { display: flex; }
  .save-bar input {
    width: 100%;
    font-size: 0.82rem;
  }
  .save-bar textarea {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 8px 12px;
    border-radius: 8px;
    font-family: 'Source Code Pro', monospace;
    font-size: 0.8rem;
    resize: vertical;
    min-height: 60px;
    outline: none;
  }
  .save-bar textarea:focus { border-color: var(--accent); }
  .save-actions { display: flex; gap: 8px; }
  .save-actions button { flex: 1; }

  .tag {
    display: inline-block;
    font-size: 0.7rem;
    padding: 2px 8px;
    border-radius: 20px;
    background: rgba(178,34,52,0.15);
    color: #e05568;
    font-family: 'Source Code Pro', monospace;
  }

  /* ── Animations ── */
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  .fade-in { animation: fadeIn 0.3s ease forwards; }
</style>
</head>
<body>
<div class="app">

  <!-- Header -->
  <header>
    <div class="logo">
      <div class="logo-icon">🎙</div>
      <h1>Shadow<span>Lab</span></h1>
    </div>
    <div style="display:flex;align-items:center;gap:8px">
      <button id="wakeBtn" class="secondary" onclick="wakeBackend()" style="padding:6px 12px;font-size:0.75rem">⚡ Wake up</button>
    </div>
    <div class="student-selector">
      <label>Student</label>
      <input type="text" id="studentInput" placeholder="Student name..." style="width:160px">
    </div>
  </header>

  <!-- URL Bar -->
  <div class="url-bar">
    <input type="text" id="urlInput" placeholder="Paste a YouTube URL… e.g. https://www.youtube.com/watch?v=..." />
    <button id="loadBtn" onclick="loadVideo()">Load</button>
  </div>

  <!-- Status -->
  <div class="status" id="status">
    <div class="spinner" id="statusSpinner"></div>
    <span id="statusText"></span>
  </div>

  <!-- Sessions preview (visible before video load) -->
  <div id="sessionsPreview" style="display:none;margin-bottom:20px">
    <div class="panel-card">
      <div class="panel-header">
        <span class="panel-title">Saved Sessions</span>
        <span class="source-badge" id="sessionsStudentBadge" style="background:rgba(71,255,232,0.15);color:var(--accent2)"></span>
      </div>
      <div class="sessions-list" id="sessionsPreviewList">
        <div class="empty-state">No sessions yet.</div>
      </div>
    </div>
  </div>

  <!-- Main grid (hidden until video loaded) -->
  <div class="main-grid" id="mainGrid" style="display:none">

    <!-- LEFT: Video + controls -->
    <div class="video-panel">

      <div class="video-wrapper" id="videoWrapper">
        <div class="video-placeholder" id="videoPlaceholder">
          <div class="ph-icon">▶</div>
          <p>Video will appear here</p>
        </div>
        <div id="ytPlayer"></div>
      </div>

      <!-- Playback controls -->
      <div class="controls">
        <button class="secondary" onclick="seekRelative(-5)">⏪ 5s</button>
        <button class="secondary" onclick="togglePlay()" id="playPauseBtn">▶ Play</button>
        <button class="secondary" onclick="seekRelative(5)">5s ⏩</button>
        <button class="secondary" id="loopBtn" onclick="toggleLoop()">⟳ Loop OFF</button>
        <div class="speed-group">
          <label>Speed</label>
          <button class="speed-btn active" onclick="setSpeed(0.5, this)">×0.5</button>
          <button class="speed-btn" onclick="setSpeed(0.75, this)">×0.75</button>
          <button class="speed-btn" onclick="setSpeed(1, this)">×1</button>
        </div>
      </div>

    </div><!-- /video-panel -->

    <!-- RIGHT: Transcript + Sessions -->
    <div class="transcript-panel">

      <!-- Transcript -->
      <div class="panel-card">
        <div class="panel-header">
          <span class="panel-title">Transcript</span>
          <span class="source-badge" id="sourceBadge"></span>
        </div>
        <div class="transcript-list" id="transcriptList">
          <div class="empty-state">Load a video to see the transcript.</div>
        </div>
        <div class="loop-bar">
          <span class="loop-info" id="loopInfo">Tap a line to loop it</span>
          <div class="loop-count">
            <label style="font-size:0.75rem;color:var(--text-dim)">Loops</label>
            <select id="loopCountSel">
              <option value="2">×2</option>
              <option value="3" selected>×3</option>
              <option value="5">×5</option>
              <option value="10">×10</option>
              <option value="0">∞</option>
            </select>
          </div>
        </div>
      </div>

      <!-- Sessions -->
      <div class="panel-card">
        <div class="panel-header">
          <span class="panel-title">Saved Sessions</span>
          <button style="padding:4px 10px;font-size:0.75rem" onclick="toggleSaveBar()">+ Save</button>
        </div>
        <div class="save-bar" id="saveBar">
          <input type="text" id="videoTitleInput" placeholder="Video title (optional)…" />
          <textarea id="notesInput" placeholder="Session notes…"></textarea>
          <div class="save-actions">
            <button class="secondary" onclick="toggleSaveBar()">Cancel</button>
            <button id="updateSessionBtn" class="secondary" onclick="updateSession()" style="display:none">Update</button>
            <button onclick="saveSession()">Save new</button>
          </div>
        </div>
        <div class="sessions-list" id="sessionsList">
          <div class="empty-state">No sessions yet.</div>
        </div>
      </div>

    </div><!-- /transcript-panel -->
  </div><!-- /main-grid -->

  <!-- Exercises row - full width below grid -->
  <div class="exercises-row">
    <div class="panel-card">
      <div class="panel-header">
        <span class="panel-title">Exercises</span>
        <div style="display:flex;gap:6px">
          <button class="secondary" style="padding:4px 10px;font-size:0.75rem" onclick="toggleExercises()">Show/Hide</button>
          <button style="padding:4px 10px;font-size:0.75rem" id="genBtn" onclick="generateExercises()">Generate</button>
        </div>
      </div>
      <div class="exercises-panel" id="exercisesPanel">
        <div class="ex-tabs">
          <button class="ex-tab active" onclick="switchTab('fill_blank', this)">Fill blank</button>
          <button class="ex-tab" onclick="switchTab('dictation', this)">Dictation</button>
          <button class="ex-tab" onclick="switchTab('loop_drill', this)">Loop drill</button>
          <button class="ex-tab" onclick="switchTab('true_false', this)">True/False</button>
          <button class="ex-tab" onclick="switchTab('sentence_ordering', this)">Word order</button>
          <button class="ex-tab" onclick="switchTab('vocabulary', this)">Vocabulary</button>
          <button class="ex-tab" onclick="switchTab('qa', this)">Q&amp;A</button>
          <button class="ex-tab" onclick="switchTab('grammar', this)">Grammar</button>
          <button class="ex-tab" onclick="switchTab('conversation', this)">Conversation</button>
          <button class="ex-tab" onclick="switchTab('pronunciation', this)">Pronunciation</button>
        </div>
        <div class="ex-content" id="exContent">
          <div class="empty-state">Click "Generate" to create exercises from this video.</div>
        </div>
      </div>
    </div>
  </div>

</div><!-- /app -->

<!-- YouTube IFrame API -->
<script src="https://www.youtube.com/iframe_api"></script>
<script>
// ── Config ────────────────────────────────────────────────────────────────────
const BACKEND = 'https://shadowing-app-backend.onrender.com';

// ── State ─────────────────────────────────────────────────────────────────────
let player = null;
let transcript = [];
let activeLineIndex = -1;
let currentVideoId = null;
let loopActive = false;
let loopLine = null;
let loopCount = 0;
let loopTarget = 3;
let syncInterval = null;
let exerciseCache = {};
let pendingExerciseCache = null;
let currentSessionId = null;
let pendingSessionId = null;
let currentExType = 'fill_blank';

// ── YouTube Player ─────────────────────────────────────────────────────────
function onYouTubeIframeAPIReady() {}

function createPlayer(videoId) {
  if (player) { player.destroy(); }
  player = new YT.Player('ytPlayer', {
    videoId,
    playerVars: { rel: 0, modestbranding: 1 },
    events: {
      onReady: () => {
        document.getElementById('playPauseBtn').textContent = '▶ Play';
        startSyncLoop();
      },
      onStateChange: (e) => {
        const playing = e.data === YT.PlayerState.PLAYING;
        document.getElementById('playPauseBtn').textContent = playing ? '⏸ Pause' : '▶ Play';
        if (!playing) { stopSyncLoop(); } else { startSyncLoop(); }
      }
    }
  });
}

// ── Sync loop ─────────────────────────────────────────────────────────────────
function startSyncLoop() {
  if (syncInterval) clearInterval(syncInterval);
  syncInterval = setInterval(syncTranscript, 200);
}
function stopSyncLoop() {
  clearInterval(syncInterval);
  syncInterval = null;
}

function syncTranscript() {
  if (!player || !player.getCurrentTime) return;
  const t = player.getCurrentTime();
  const idx = findActiveSegment(t);

  // Loop logic
  if (loopActive && loopLine !== null) {
    const seg = transcript[loopLine];
    const end = seg.start + seg.duration + 0.1;
    if (t >= end) {
      if (loopTarget === 0 || loopCount < loopTarget - 1) {
        loopCount++;
        player.seekTo(seg.start, true);
        return;
      } else {
        loopCount = 0;
        setLoopLine(null);
      }
    }
  }

  if (idx !== activeLineIndex) {
    setActiveLine(idx);
  }
}

function findActiveSegment(t) {
  for (let i = 0; i < transcript.length; i++) {
    const s = transcript[i];
    if (t >= s.start && t < s.start + s.duration + 0.3) return i;
  }
  return -1;
}

// ── Load video ────────────────────────────────────────────────────────────────
async function loadVideo() {
  const url = document.getElementById('urlInput').value.trim();
  if (!url) return;

  showStatus('Fetching transcript…', false);
  document.getElementById('loadBtn').disabled = true;
  document.getElementById('mainGrid').style.display = 'none';

  try {
    const res = await fetch(`${BACKEND}/api/transcript?url=${encodeURIComponent(url)}`);
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Failed');

    transcript = (data.transcript || []).map(seg => ({
      text: seg.text || seg.content || seg.transcript || seg.words || JSON.stringify(seg),
      start: typeof seg.start === 'number' ? seg.start : (seg.offset / 1000 || 0),
      duration: typeof seg.duration === 'number' ? seg.duration : (seg.dur || seg.length || 2)
    })).filter(seg => seg.text && seg.text !== 'undefined');
    currentVideoId = data.videoId;
    exerciseCache = {};
    currentSessionId = null; // reset sessione corrente
    document.getElementById('exercisesPanel').classList.remove('show');
    document.getElementById('exContent').innerHTML = '<div class="empty-state">Click "Generate" to create exercises from this video.</div>';
    document.querySelectorAll('.ex-tab').forEach(b => b.classList.remove('active'));
    document.querySelector('.ex-tab').classList.add('active');
    currentExType = 'fill_blank';

    // Source badge
    const badge = document.getElementById('sourceBadge');
    badge.textContent = data.source === 'youtube' ? 'YT captions' : 'Gemini AI';
    badge.className = `source-badge ${data.source}`;

    renderTranscript();
    showStatus('', false);
    document.getElementById('mainGrid').style.display = 'grid';

    // Create player
    if (typeof YT !== 'undefined' && YT.Player) {
      createPlayer(currentVideoId);
    } else {
      window.onYouTubeIframeAPIReady = () => createPlayer(currentVideoId);
    }

    // Load sessions for this student
    loadSessions();

    // Ripristina sessionId se disponibile
    if (pendingSessionId) {
      currentSessionId = pendingSessionId;
      pendingSessionId = null;
    }

    // Ripristina cache esercizi se disponibile
    if (pendingExerciseCache) {
      exerciseCache = pendingExerciseCache;
      pendingExerciseCache = null;
      // Mostra il primo tipo disponibile
      const firstType = Object.keys(exerciseCache)[0];
      if (firstType) {
        document.getElementById('exercisesPanel').classList.add('show');
        // Attiva il tab corrispondente
        document.querySelectorAll('.ex-tab').forEach(btn => {
          btn.classList.toggle('active', btn.getAttribute('onclick').includes(firstType));
        });
        currentExType = firstType;
        renderExercises(exerciseCache[firstType], firstType);
      }
    }

  } catch (err) {
    showStatus('Error: ' + err.message, true);
  } finally {
    document.getElementById('loadBtn').disabled = false;
  }
}

// ── Transcript rendering ──────────────────────────────────────────────────────
function renderTranscript() {
  const list = document.getElementById('transcriptList');
  list.innerHTML = '';
  transcript.forEach((seg, i) => {
    const div = document.createElement('div');
    div.className = 'transcript-line fade-in';
    div.dataset.index = i;
    div.innerHTML = `
      <span class="line-time">${formatTime(seg.start)}</span>
      <span class="line-text">${seg.text}</span>
    `;
    div.addEventListener('click', () => {
      if (loopLine === i && loopActive) {
        // Secondo tap sulla stessa riga: disattiva loop
        loopActive = false;
        updateLoopBtn();
      } else {
        // Tap su nuova riga: salta, avvia, attiva loop
        if (player) { player.seekTo(seg.start, true); player.playVideo(); }
        setLoopLine(i);
        loopActive = true;
        loopCount = 0;
        updateLoopBtn();
      }
    });
    list.appendChild(div);
  });
}

function setActiveLine(idx) {
  activeLineIndex = idx;
  const items = document.querySelectorAll('.transcript-line');
  items.forEach((el, i) => {
    el.classList.toggle('active', i === idx);
    if (i === idx) {
      // Scroll solo verticale dentro il pannello transcript, non l'intera pagina
      const list = document.getElementById('transcriptList');
      const elTop = el.offsetTop - list.offsetTop;
      const listScroll = list.scrollTop;
      const listHeight = list.clientHeight;
      if (elTop < listScroll || elTop > listScroll + listHeight - 60) {
        list.scrollTop = elTop - listHeight / 2;
      }
    }
  });
}

// ── Loop ──────────────────────────────────────────────────────────────────────
async function addVocabInput(existingData) {
  const c = document.getElementById('exContent');
  if (!c) return;
  // Rimuovi eventuale input precedente
  const old = document.getElementById('vocabInputRow');
  if (old) old.remove();

  const row = document.createElement('div');
  row.id = 'vocabInputRow';
  row.style.cssText = 'grid-column:1/-1;display:flex;gap:8px;padding:8px 0;border-top:1px solid var(--border);margin-top:4px;';
  row.innerHTML = `
    <input type="text" id="vocabCustomInput" placeholder="Add a word or phrase… e.g. you ruled the roost" style="flex:1;font-size:0.82rem;padding:8px 12px">
    <button id="vocabAddBtn" style="padding:8px 14px;font-size:0.8rem">+ Add</button>
  `;
  c.appendChild(row);

  document.getElementById('vocabAddBtn').addEventListener('click', async () => {
    const phrase = document.getElementById('vocabCustomInput').value.trim();
    if (!phrase) return;
    const btn = document.getElementById('vocabAddBtn');
    btn.textContent = '⏳';
    btn.disabled = true;

    try {
      const res = await fetch(`${BACKEND}/api/exercises`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ transcript, type: 'vocabulary_single', customPhrase: phrase })
      });
      const data = await res.json();
      if (data.exercises && data.exercises[0]) {
        const ex = data.exercises[0];
        const div = document.createElement('div');
        div.className = 'ex-item fade-in';
        div.style.borderColor = '#ffffff';
        div.innerHTML = `
          <div class="ex-sentence" style="font-weight:700;font-size:1rem">${ex.word}</div>
          <div class="ex-meta" style="margin:4px 0">${ex.definition}</div>
          <div class="ex-answer" style="display:block;font-size:0.8rem;color:var(--text-dim);font-family:'Source Code Pro',monospace">"<em>${ex.transcript_example || ex.example}</em>"</div>`;
        // Inserisci prima del campo input
        c.insertBefore(div, row);
        document.getElementById('vocabCustomInput').value = '';
        // Aggiorna cache
        if (exerciseCache['vocabulary']) {
          exerciseCache['vocabulary'].exercises.push(ex);
        }
      }
    } catch(e) { console.error(e); }
    btn.textContent = '+ Add';
    btn.disabled = false;
  });
}

function updateLoopBtn() {
  const btn = document.getElementById('loopBtn');
  if (loopActive && loopLine !== null) {
    btn.style.background = 'var(--accent)';
    btn.style.color = '#ffffff';
    btn.textContent = '⟳ Loop ON';
  } else {
    btn.style.background = '';
    btn.style.color = '';
    btn.textContent = '⟳ Loop OFF';
  }
}

function setLoopLine(idx) {
  loopLine = idx;
  loopCount = 0;
  loopTarget = parseInt(document.getElementById('loopCountSel').value);
  if (idx !== null) {
    const seg = transcript[idx];
    document.getElementById('loopInfo').textContent = `"${seg.text.substring(0, 40)}…"`;
  } else {
    document.getElementById('loopInfo').textContent = 'Tap a line to loop it';
    loopActive = false;
    updateLoopBtn();
  }
}

function toggleLoop() {
  if (loopLine === null) return;
  loopActive = !loopActive;
  loopCount = 0;
  updateLoopBtn();
  if (loopActive && player) {
    player.seekTo(transcript[loopLine].start, true);
    player.playVideo();
  }
}

// ── Playback controls ─────────────────────────────────────────────────────────
function togglePlay() {
  if (!player) return;
  const state = player.getPlayerState();
  if (state === YT.PlayerState.PLAYING) { player.pauseVideo(); } else { player.playVideo(); }
}

function seekRelative(delta) {
  if (!player) return;
  player.seekTo(player.getCurrentTime() + delta, true);
}

function setSpeed(rate, btn) {
  if (player) player.setPlaybackRate(rate);
  document.querySelectorAll('.speed-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}

// ── Exercises ─────────────────────────────────────────────────────────────────
function toggleExercises() {
  document.getElementById('exercisesPanel').classList.toggle('show');
}

function switchTab(type, btn) {
  currentExType = type;
  document.querySelectorAll('.ex-tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  if (exerciseCache[type]) { renderExercises(exerciseCache[type], type); }
  else { document.getElementById('exContent').innerHTML = '<div class="empty-state">Click "Generate" to create exercises.</div>'; }
}

async function generateExercises() {
  if (!transcript.length) return;
  const btn = document.getElementById('genBtn');
  btn.disabled = true;
  btn.textContent = 'Generating…';
  document.getElementById('exercisesPanel').classList.add('show');
  document.getElementById('exContent').innerHTML = '<div class="empty-state">⏳ Asking Claude…</div>';

  try {
    const res = await fetch(`${BACKEND}/api/exercises`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ transcript, type: currentExType })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error);
    exerciseCache[currentExType] = data;
    renderExercises(data, currentExType);
  } catch (err) {
    document.getElementById('exContent').innerHTML = `<div class="empty-state" style="color:var(--accent3)">Error: ${err.message}</div>`;
  } finally {
    btn.disabled = false;
    btn.textContent = 'Generate';
  }
}

function renderExercises(data, type) {
  const c = document.getElementById('exContent');
  c.innerHTML = '';

  // Per vocabulary aggiungi campo input custom alla fine
  if (type === 'vocabulary') {
    // Verrà aggiunto dopo il loop — usiamo un flag
    setTimeout(() => addVocabInput(data), 50);
  }

  // Grammar ha struttura speciale — gestiscila prima del loop
  if (type === 'grammar') {
    const subItems = (data.exercises || []).map(item => {
      if (item.type === 'repeat') {
        return `<div style="margin-top:10px;padding-top:10px;border-top:1px solid var(--border)">
          <div class="ex-sentence">🔊 ${item.prompt}</div>
        </div>`;
      }
      return `<div style="margin-top:10px;padding-top:10px;border-top:1px solid var(--border)">
        <div class="ex-sentence">${item.prompt || ''}</div>
        ${item.answer ? `<div class="ex-answer">✓ ${item.answer}</div>` : ''}
        ${item.transcript_line ? `<div class="ex-meta" style="margin-top:4px">From video: "<em>${item.transcript_line}</em>"</div>` : ''}
      </div>`;
    }).join('');
    c.innerHTML = `<div class="ex-item fade-in" style="border-color:rgba(178,34,52,0.4)">
      <div style="font-size:0.9rem;font-weight:700;color:var(--accent)">${data.structure || 'Grammar focus'}</div>
      <div style="font-size:0.82rem;margin-top:6px;color:var(--text-dim)">${data.explanation || ''}</div>
      ${subItems}
    </div>`;
    return;
  }

  const exercises = data.exercises || [];
  if (!exercises.length) { c.innerHTML = '<div class="empty-state">No exercises generated.</div>'; return; }

  exercises.forEach(ex => {
    const div = document.createElement('div');
    div.className = 'ex-item fade-in';
    div.style.cursor = 'pointer';
    div.title = 'Tap to reveal answer';

    if (type === 'fill_blank') {
      div.innerHTML = `
        <div class="ex-sentence">${ex.sentence}</div>
        <div class="ex-answer">✓ ${ex.blank}</div>
        <div class="ex-meta">${ex.context || ''}</div>`;
    } else if (type === 'dictation') {
      const dictId = 'dict_' + Math.random().toString(36).substr(2,6);
      div.innerHTML = `
        <div class="ex-sentence" style="margin-bottom:6px">🎧 Listen and write</div>
        <div class="ex-meta" style="margin-bottom:8px">${ex.difficulty || ''}${ex.focus ? ' · ' + ex.focus : ''}</div>
        <button id="${dictId}" style="padding:4px 12px;font-size:0.75rem;background:var(--surface2);color:var(--text);border:1px solid var(--border)">Show answer</button>
        <div class="ex-answer" id="ans_${dictId}" style="display:none;margin-top:6px">✓ ${ex.text}</div>`;
      setTimeout(() => {
        const btn = document.getElementById(dictId);
        if (btn) btn.addEventListener('click', () => {
          const ans = document.getElementById('ans_' + dictId);
          if (ans.style.display === 'none') { ans.style.display = 'block'; btn.textContent = 'Hide'; }
          else { ans.style.display = 'none'; btn.textContent = 'Show answer'; }
        });
      }, 50);
    } else if (type === 'loop_drill') {
      const stress = (ex.stress_words || []).map(w => `<span class="stress-tag">${w}</span>`).join('');
      const drillId = 'drill_' + Math.random().toString(36).substr(2,6);
      div.innerHTML = `
        <div class="ex-sentence">${ex.text}</div>
        <div class="ex-meta">${ex.reason || ''}</div>
        <div class="stress-words">${stress}</div>
        <button id="${drillId}" style="margin-top:8px;padding:5px 12px;font-size:0.75rem">▶ Practice this</button>`;
      // Usa setTimeout per assicurarsi che il DOM sia pronto
      setTimeout(() => {
        const btn = document.getElementById(drillId);
        if (btn) btn.addEventListener('click', (e) => {
          e.stopPropagation();
          btn.textContent = '⏳';
          const searchText = ex.text.toLowerCase().substring(0, 30);
          // Ricerca più ampia: parole chiave singole
          const words = ex.text.toLowerCase().split(' ').filter(w => w.length > 4);
          let idx = transcript.findIndex(s => 
            s.text.toLowerCase().includes(searchText) ||
            searchText.includes(s.text.toLowerCase().substring(0, 20))
          );
          // Fallback: cerca per parole chiave
          if (idx < 0 && words.length > 0) {
            idx = transcript.findIndex(s => 
              words.some(w => s.text.toLowerCase().includes(w))
            );
          }
          if (idx >= 0 && player) {
            btn.textContent = '✓ Playing';
            player.seekTo(transcript[idx].start, true);
            player.playVideo();
            setLoopLine(idx);
            loopActive = true;
            loopCount = 0;
            updateLoopBtn();
            setTimeout(() => { btn.textContent = '▶ Practice this'; }, 2000);
          } else if (!player) {
            btn.textContent = '⚠ Start video first';
            setTimeout(() => { btn.textContent = '▶ Practice this'; }, 2000);
          } else {
            btn.textContent = '⚠ Line not found';
            setTimeout(() => { btn.textContent = '▶ Practice this'; }, 2000);
          }
        });
      }, 50);
    } else if (type === 'true_false') {
      div.innerHTML = `
        <div class="ex-sentence">${ex.statement}</div>
        <div class="ex-answer">${ex.answer ? '✓ TRUE' : '✗ FALSE'}${ex.correction ? ' — ' + ex.correction : ''}</div>`;

    } else if (type === 'sentence_ordering') {
      const shuffled = [...ex.words].map(w => `<span class="stress-tag">${w}</span>`).join(' ');
      div.innerHTML = `
        <div class="ex-sentence" style="margin-bottom:8px">Put in order:</div>
        <div class="stress-words" style="margin-bottom:8px">${shuffled}</div>
        <div class="ex-answer">✓ ${ex.answer}</div>`;

    } else if (type === 'vocabulary') {
      div.innerHTML = `
        <div class="ex-sentence" style="font-weight:700;font-size:1rem">${ex.word}</div>
        <div class="ex-meta" style="margin:4px 0">${ex.definition}</div>
        <div class="ex-answer" style="display:block;font-size:0.8rem;color:var(--text-dim);font-family:'Source Code Pro',monospace">"<em>${ex.transcript_example || ex.example}</em>"</div>`;

    } else if (type === 'qa') {
      div.innerHTML = `
        <div class="ex-sentence">❓ ${ex.question}</div>
        <div class="ex-meta" style="margin-top:4px">💡 ${ex.hint || ''}</div>
        <div class="ex-answer">Model: ${ex.model_answer}</div>`;

    } else if (type === 'grammar') {
      // Grammar: costruisci tutto nel div principale
      const subItems = (ex.exercises || []).map(item => {
        if (item.type === 'repeat') {
          return `<div class="ex-sentence" style="margin-top:8px">🔊 ${item.prompt}</div>`;
        }
        return `<div style="margin-top:8px;padding-top:8px;border-top:1px solid var(--border)">
          <div class="ex-sentence">${item.prompt || ''}</div>
          ${item.answer ? `<div class="ex-answer">✓ ${item.answer}</div>` : ''}
          ${item.transcript_line ? `<div class="ex-meta">From video: "${item.transcript_line}"</div>` : ''}
        </div>`;
      }).join('');
      div.style.background = 'rgba(178,34,52,0.08)';
      div.style.borderColor = 'rgba(178,34,52,0.4)';
      div.innerHTML = `
        <div style="font-size:0.9rem;font-weight:700;color:var(--accent)">${ex.structure || 'Grammar focus'}</div>
        <div style="font-size:0.82rem;margin-top:4px;color:var(--text-dim)">${ex.explanation || ''}</div>
        ${subItems}`;

    } else if (type === 'conversation') {
      div.innerHTML = `
        <div class="ex-sentence">💬 ${ex.question}</div>
        <div class="ex-meta" style="margin-top:6px;color:var(--accent2)">Start with: ${ex.scaffold || ''}</div>`;

    } else if (type === 'pronunciation') {
      div.innerHTML = `
        <div class="ex-sentence">🎙 "${ex.text}"</div>
        <div class="ex-meta" style="margin-top:4px">${ex.focus}</div>
        <div style="margin-top:4px;font-size:0.78rem;color:var(--accent2)">Tip: ${ex.tip}</div>`;
    }
    c.appendChild(div);
    // Tap to reveal answer
    const answer = div.querySelector('.ex-answer');
    if (answer) {
      answer.style.display = 'none';
      const hint = document.createElement('div');
      hint.style.cssText = 'font-size:0.7rem;color:var(--text-dim);margin-top:6px';
      hint.textContent = '👆 Tap to reveal';
      div.appendChild(hint);
      div.addEventListener('click', () => {
        if (answer.style.display === 'none') {
          answer.style.display = 'block';
          hint.textContent = '👆 Tap to hide';
        } else {
          answer.style.display = 'none';
          hint.textContent = '👆 Tap to reveal';
        }
      });
    }
  });
}

// ── Sessions ──────────────────────────────────────────────────────────────────
function toggleSaveBar() {
  document.getElementById('saveBar').classList.toggle('show');
  // Mostra Update solo se c'è una sessione corrente
  const updateBtn = document.getElementById('updateSessionBtn');
  if (updateBtn) updateBtn.style.display = currentSessionId ? 'flex' : 'none';
}

async function updateSession() {
  if (!currentSessionId) return;
  const notes = document.getElementById('notesInput').value.trim() || null;
  const videoTitle = document.getElementById('videoTitleInput').value.trim() || null;
  try {
    const res = await fetch(`${BACKEND}/api/sessions/${currentSessionId}`, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        notes,
        video_title: videoTitle,
        exercises: Object.keys(exerciseCache).length > 0 ? exerciseCache : null
      })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error);
    toggleSaveBar();
    loadSessions();
  } catch (err) {
    alert('Error updating session: ' + err.message);
  }
}

async function saveSession() {
  const student = document.getElementById('studentInput').value.trim();
  if (!student) { alert('Please enter a student name first.'); return; }
  if (!currentVideoId) return;

  const payload = {
    student_name: student,
    video_url: document.getElementById('urlInput').value.trim(),
    video_id: currentVideoId,
    video_title: document.getElementById('videoTitleInput').value.trim() || null,
    notes: document.getElementById('notesInput').value.trim() || null,
    exercises: Object.keys(exerciseCache).length > 0 ? exerciseCache : null
  };

  try {
    const res = await fetch(`${BACKEND}/api/sessions`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error);
    toggleSaveBar();
    loadSessions();
  } catch (err) {
    alert('Error saving session: ' + err.message);
  }
}

async function loadSessions() {
  const student = document.getElementById('studentInput').value.trim();
  const url = student ? `${BACKEND}/api/sessions?student=${encodeURIComponent(student)}` : `${BACKEND}/api/sessions`;

  try {
    const res = await fetch(url);
    const data = await res.json();
    renderSessions(data.sessions || []);
  } catch(err) {
    console.error('Sessions load error:', err);
    const preview = document.getElementById('sessionsPreview');
    const list = document.getElementById('sessionsPreviewList');
    list.innerHTML = '<div class="empty-state">⏳ Backend waking up... retry in a few seconds</div>';
    preview.style.display = 'block';
  }
}

function renderSessions(sessions) {
  const list = document.getElementById('sessionsList');
  if (!sessions.length) {
    list.innerHTML = '<div class="empty-state">No sessions yet.</div>';
    return;
  }
  list.innerHTML = '';
  sessions.forEach(s => {
    const div = document.createElement('div');
    div.className = 'session-item fade-in';
    const date = new Date(s.created_at).toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: '2-digit' });
    div.innerHTML = `
      <div class="session-dot"></div>
      <div class="session-info">
        <div class="session-title">${s.video_title || s.video_id}</div>
        <div class="session-meta">${s.student_name} · ${date}</div>
      </div>
      <button class="del-btn" data-id="${s.id}" style="background:transparent;border:none;color:var(--text-dim);font-size:1rem;padding:4px 8px;cursor:pointer;flex-shrink:0" title="Delete">🗑</button>
    `;
    div.querySelector('.del-btn').addEventListener('click', async (e) => {
      e.stopPropagation();
      if (!confirm('Delete this session?')) return;
      try {
        await fetch(`${BACKEND}/api/sessions/${s.id}`, { method: 'DELETE' });
        loadSessions();
        if (currentSessionId === s.id) currentSessionId = null;
      } catch(err) { alert('Error: ' + err.message); }
    });
    div.addEventListener('click', () => {
      document.getElementById('urlInput').value = s.video_url;
      if (s.exercises) pendingExerciseCache = s.exercises;
      pendingSessionId = s.id;
      loadVideo();
    });
    list.appendChild(div);
  });
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function formatTime(sec) {
  const m = Math.floor(sec / 60);
  const s = Math.floor(sec % 60);
  return `${m}:${s.toString().padStart(2, '0')}`;
}

function showStatus(msg, isError) {
  const el = document.getElementById('status');
  const spinner = document.getElementById('statusSpinner');
  if (!msg) { el.classList.remove('show', 'error'); return; }
  el.classList.add('show');
  el.classList.toggle('error', isError);
  spinner.style.display = isError ? 'none' : 'block';
  document.getElementById('statusText').textContent = msg;
}

// Load on Enter key
document.getElementById('urlInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') loadVideo();
});

// Carica sessioni appena l'utente scrive il nome studente
async function wakeBackend() {
  const btn = document.getElementById('wakeBtn');
  btn.textContent = '⏳ Waking...';
  btn.disabled = true;
  let attempts = 0;
  const maxAttempts = 5;
  
  const tryWake = async () => {
    attempts++;
    btn.textContent = `⏳ Waking (${attempts}/${maxAttempts})...`;
    try {
      const controller = new AbortController();
      const timeout = setTimeout(() => controller.abort(), 15000);
      const res = await fetch(`${BACKEND}/health`, { signal: controller.signal });
      clearTimeout(timeout);
      if (res.ok) {
        btn.textContent = '✓ Ready!';
        btn.style.borderColor = 'var(--accent)';
        btn.style.color = 'var(--accent)';
        btn.disabled = false;
        setTimeout(() => {
          btn.textContent = '⚡ Wake up';
          btn.style.borderColor = '';
          btn.style.color = '';
        }, 3000);
        return;
      }
    } catch(e) {}
    
    if (attempts < maxAttempts) {
      setTimeout(tryWake, 5000);
    } else {
      btn.textContent = '✗ Retry';
      btn.disabled = false;
    }
  };
  
  tryWake();
}

document.getElementById('studentInput').addEventListener('input', function() {

async function loadSessionsPreview(student) {
  try {
    const res = await fetch(`${BACKEND}/api/sessions?student=${encodeURIComponent(student)}`);
    const data = await res.json();
    const sessions = data.sessions || [];
    const preview = document.getElementById('sessionsPreview');
    const list = document.getElementById('sessionsPreviewList');
    const badge = document.getElementById('sessionsStudentBadge');
    
    badge.textContent = student;
    
    if (!sessions.length) {
      list.innerHTML = '<div class="empty-state">No sessions for this student yet.</div>';
    } else {
      list.innerHTML = '';
      sessions.forEach(s => {
        const div = document.createElement('div');
        div.className = 'session-item fade-in';
        const date = new Date(s.created_at).toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: '2-digit' });
        div.innerHTML = `
          <div class="session-dot"></div>
          <div class="session-info">
            <div class="session-title">${s.video_title || s.video_id}</div>
            <div class="session-meta">${date}${s.notes ? ' · ' + s.notes.substring(0,40) : ''}</div>
          </div>
          <div style="display:flex;gap:4px;flex-shrink:0">
            <button class="load-btn" style="padding:4px 10px;font-size:0.72rem">▶ Load</button>
            <button class="del-btn" style="background:transparent;border:1px solid var(--border);color:var(--text-dim);padding:4px 8px;font-size:0.85rem;border-radius:6px">🗑</button>
          </div>
        `;
        div.querySelector('.load-btn').addEventListener('click', () => {
          document.getElementById('urlInput').value = s.video_url;
          if (s.exercises) pendingExerciseCache = s.exercises;
          pendingSessionId = s.id;
          loadVideo();
        });
        div.querySelector('.del-btn').addEventListener('click', async (e) => {
          e.stopPropagation();
          if (!confirm('Delete this session?')) return;
          try {
            await fetch(`${BACKEND}/api/sessions/${s.id}`, { method: 'DELETE' });
            loadSessionsPreview(document.getElementById('studentInput').value.trim());
          } catch(err) { alert('Error: ' + err.message); }
        });
        list.appendChild(div);
      });
    }
    preview.style.display = 'block';
  } catch { /* silent */ }
}
